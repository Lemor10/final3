<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Data Analysis</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background: #f8f9fa; font-family: "Poppins", sans-serif; }
        .card { border-radius: 1rem; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .chart-container { background: white; padding: 30px; border-radius: 1rem; margin-bottom: 20px; }
    </style>
</head>

<body>

<!-- NAVBAR -->
{% include 'navbar_admin.html' %}
<div class="container">

    <!-- SUMMARY CARDS -->
    <div class="row text-center mb-4">

        <div class="col-md-4">
            <div class="card p-3">
                <h5>Total Users</h5>
                <h2>{{ total_users }}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h5>Total Owners</h5>
                <h2>{{ total_owners }}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h5>Total Dogs</h5>
                <h2>{{ total_dogs }}</h2>
            </div>
        </div>

    </div>

    <!-- BAR CHART -->
    <div class="chart-container">
        <h5 class="text-center">Dogs per Breed</h5>
        <canvas id="breedChart"></canvas>
    </div>

    <!-- PIE CHART -->
    <div class="chart-container">
        <h5 class="text-center">Vaccination Status</h5>
        <canvas id="vaccineChart"></canvas>
    </div>

    <!-- LINE CHART -->
    <div class="chart-container mb-5">
        <h5 class="text-center">Monthly Dog Registrations</h5>
        <canvas id="monthlyChart"></canvas>
    </div>

</div>

<script>
    // BAR CHART: Dogs per breed
    new Chart(document.getElementById('breedChart'), {
        type: 'bar',
        data: {
            labels: {{ breeds|tojson }},
            datasets: [{
                label: 'Number of Dogs',
                data: {{ breed_numbers|tojson }},
            }]
        }
    });

    // PIE CHART: Vaccinated vs Not
    new Chart(document.getElementById('vaccineChart'), {
        type: 'pie',
        data: {
            labels: ['Vaccinated', 'Not Vaccinated'],
            datasets: [{
                data: [{{ vaccinated_count }}, {{ unvaccinated_count }}],
            }]
        }
    });

    // LINE CHART: Monthly registrations
    new Chart(document.getElementById('monthlyChart'), {
        type: 'line',
        data: {
            labels: {{ months|tojson }},
            datasets: [{
                label: 'Dogs Registered',
                data: {{ month_counts|tojson }},
                fill: false,
                tension: 0.2
            }]
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
