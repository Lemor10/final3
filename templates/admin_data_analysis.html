<div class="col-md-3">
  <div class="card text-center p-3">
    <div class="metric">{{ total_vaccinated }}</div>
    <div class="metric-label">Vaccinated Dogs</div>
  </div>
</div>
<div class="col-md-3">
  <div class="card text-center p-3">
    <div class="metric">{{ total_not_vaccinated }}</div>
    <div class="metric-label">Not Vaccinated Dogs</div>
  </div>
</div>

<canvas id="vaccinationChart"></canvas>
<script>
const vaccinationChart = new Chart(document.getElementById('vaccinationChart'), {
    type: 'doughnut',
    data: {
        labels: ['Vaccinated', 'Not Vaccinated'],
        datasets: [{
            data: [{{ total_vaccinated }}, {{ total_not_vaccinated }}],
            backgroundColor: ['#198754', '#dc3545']
        }]
    },
    options: { responsive: true }
});
</script>
