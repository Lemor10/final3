<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Owner Panel{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  {% block styles %}
  <style>
#loadingOverlay {
  position: fixed;
  inset: 0;
  background: rgba(8, 26, 48, 0.3);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;

  opacity: 1;
  visibility: visible;
  transition: opacity 0.3s ease, visibility 0.3s ease;
}

#loadingOverlay.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

/* Gradient spinner (your design) */
.loader {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  animation: spin 1s linear infinite;

  background: linear-gradient(135deg, #081a30, #9c4506, #ffffff);

  -webkit-mask: radial-gradient(circle, transparent 60%, black 61%);
  mask: radial-gradient(circle, transparent 60%, black 61%);
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
  {% endblock %}
</head>
<body>
<!-- GLOBAL LOADING OVERLAY -->
<div id="loadingOverlay">
  <div class="loader"></div>
</div>
  {% include "navbar_owner.html" %}

  <main class="container mt-4">
    {% block content %}{% endblock %}
  </main>

<script>
document.addEventListener("DOMContentLoaded", function () {

  async function updateNotifDot() {
    const res = await fetch('{{ url_for("notification_count") }}');
    const data = await res.json();
    const dot = document.getElementById('notif-dot');
    if (!dot) return;

    if (data.count > 0) {
      dot.classList.remove('d-none');
    } else {
      dot.classList.add('d-none');
    }
  }

  updateNotifDot();
  setInterval(updateNotifDot, 30000);

  document.querySelectorAll('.notif-item').forEach(item => {
    item.addEventListener('click', async () => {
      const notifId = item.dataset.id;

      const res = await fetch(`/notifications/read/${notifId}`, {
        method: 'POST',
        headers: {
          'X-CSRFToken': '{{ csrf_token() if csrf_token else "" }}'
        }
      });

      if (res.ok) {
        item.querySelector('.badge')?.remove();
        item.classList.remove('fw-bold');
        updateNotifDot();
      }
    });
  });

});
</script>
<script>
(function () {
  const loader = document.getElementById("loadingOverlay");

  function showLoader() {
    loader?.classList.remove("hidden");
  }

  function hideLoader() {
    loader?.classList.add("hidden");
  }

  // Always hide when page is fully loaded
  window.addEventListener("load", hideLoader);

  // 🔥 FIX: back/forward cache issue (this is your main bug)
  window.addEventListener("pageshow", function (event) {
    hideLoader();
  });

  // Show loader on navigation clicks
  document.addEventListener("click", function (e) {
    const link = e.target.closest("a");

    if (!link) return;

    const href = link.getAttribute("href");

    if (
      link.target === "_blank" ||
      !href ||
      href.startsWith("#") ||
      href.startsWith("javascript:")
    ) return;

    showLoader();
  });

})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</body>
</html>
