<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Owner Panel{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  {% block styles %}{% endblock %}
</head>
<body>

  {% include "navbar_owner.html" %}

  <main class="container mt-4">
    {% block content %}{% endblock %}
  </main>

  <script>

async function updateNotifDot() {
    const res = await fetch('{{ url_for("notification_count") }}');
    const data = await res.json();
    const dot = document.getElementById('notif-dot');
    if(data.count > 0){
        dot.classList.remove('d-none');
    } else {
        dot.classList.add('d-none');
    }
}

updateNotifDot();
setInterval(updateNotifDot, 30000);

document.querySelectorAll('.notif-item').forEach(item => {
    item.addEventListener('click', async () => {
        const notifId = item.dataset.id;

        // Send POST request to mark as read
        const res = await fetch(`/notifications/read/${notifId}`, {
            method: 'POST',
            headers: {
                'X-CSRFToken': '{{ csrf_token() if csrf_token else "" }}'
            }
        });

        if(res.ok){
            // Remove "New" badge and bold style
            item.querySelector('.badge')?.remove();
            item.classList.remove('fw-bold');

            // Update red dot in navbar
            updateNotifDot();
        }
    });
});

document.addEventListener("DOMContentLoaded", function () {
    fetch("/api/notification-count")
        .then(res => res.json())
        .then(data => {
            const dot = document.getElementById("notif-dot");
            if (!dot) return;

            if (data.count > 0) {
                dot.classList.remove("d-none");          
            if (window.location.pathname === "/owner/notifications") {
                dot.classList.add("d-none");
            }
            } else {
                dot.classList.add("d-none");
            }
        })
        .catch(err => console.error("Notification count error:", err));
});

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="owner_notifications.html"></script>
</body>
</html>
