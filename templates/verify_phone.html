<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Phone</title>
</head>
<body>
    <h2>Phone Verification</h2>
    <p>We sent an OTP to {{ contact }}. Enter it below:</p>

    <form method="POST">
        <input type="text" name="otp" placeholder="Enter OTP" required>
        <button type="submit">Verify</button>
    </form>

    <p><a href="{{ url_for('resend_otp') }}">Resend OTP / Register again</a></p>
</body>
</html>
