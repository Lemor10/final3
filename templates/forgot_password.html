<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot Password | TrackPawPH</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #081a30, #9c4506);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "Poppins", sans-serif;
  color: white;
  overflow-x: hidden;
}

/* Background blobs */
.blob {
  position: absolute;
  width: 350px;
  height: 350px;
  background: rgba(255, 255, 255, 0.292);
  border-radius: 50%;
  filter: blur(80px);
}
.blob.one { top: -100px; left: -100px; }
.blob.two { bottom: 50px; right: 0px; }

.card {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(14px);
  border: none;
  border-radius: 1.5rem;
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
  animation: fadeIn 0.6s ease-in-out;
  width: 100%;
  max-width: 360px;
  padding: 1.5rem 1rem;
  text-align: center;
  color: white;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-header {
  text-align: center;
  font-size: 1.4rem;
  font-weight: 600;
  border: none;
}

    .card-header .text-muted {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      font-weight: 400;
    }

.btn-primary {
  background-color: #081a30;
  border: none;
  border-radius: 50px;
  transition: all 0.2s ease;
}
.btn-primary:hover {
  background-color: #040e19;
  transform: scale(1.02);
}

.btn-outline-light {
  border-radius: 50px;
  transition: all 0.2s ease;
}

.form-label {
  font-size: 13px;
  font-weight: 500;
}

.form-control {
  border-radius: 50px;
  padding: 0.5rem 1rem;
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  color: black;
}

.form-control::placeholder {
  font-size: 14px;
  color: rgba(0,0,0,0.7);
}

.form-control:focus {
  border-color: #0062ff;
  box-shadow: 0 0 0 0.15rem rgba(111,66,193,0.25);
  background: rgba(255,255,255,0.148);
  color: rgb(0, 0, 0);
}

.alert {
  font-size: 15px;
}

a {
  text-decoration: underline;
}
a:hover {
  color: #002e60;
  text-decoration: none;
}

hr {
  margin: 1rem 0;
}

/* Keep disabled button consistent */
#resetBtn:disabled {
  background-color: #081a30;  /* same as normal btn */
  opacity: 0.6;               /* optional: slightly dimmed */
  cursor: not-allowed;        /* show the disabled cursor */
  color: white;               /* text color */
  border: none;
}
.text-muted {
  color: rgba(255,255,255,0.8) !important;
}

@media (max-width: 575px) {
  .card { padding: 1.5rem 1rem; }
  .card-header { font-size: 1.25rem; }
}
</style>
</head>

<body>
<div class="blob one"></div>
<div class="blob two"></div>

<div class="card">
  <div class="text-center mb-3">
    <img src="{{ url_for('static', filename='images/logo1.png') }}" 
         alt="Track Paw PH Logo" 
         style="height: 65px; width: auto;">
  </div>

  <div class="card-header">
    Forgot Password
    <div class="text-muted fw-normal">Enter your email to receive a reset link</div>
  </div>

  <hr>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show text-center py-2" role="alert">
        <i class="bi bi-exclamation-circle-fill me-1"></i>
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
  {% endwith %}

  <form method="POST" id="forgotForm">
    <div class="mb-3 text-start">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-control" name="email" placeholder="your@email.com" required>
    </div>

    <button type="submit" id="resetBtn" class="btn btn-primary w-100 py-2">
      Send Reset Link
    </button>
  </form>

  <div class="text-center mt-2">
    <a href="{{ url_for('login') }}" class="small text-decoration-none btn btn-outline-light w-100 py-2" style="font-size:13px;">
    Back to Login
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const button = document.getElementById("resetBtn");

// Function to disable the button for a number of seconds
function disableButton(seconds) {
  button.disabled = true;
  button.textContent = `Resend (${seconds}s)`;

  const interval = setInterval(() => {
    seconds--;
    button.textContent = `Resend (${seconds}s)`;

    if (seconds <= 0) {
      clearInterval(interval);
      button.disabled = false;
      button.textContent = "Send Reset Link";
      localStorage.removeItem("lastResetRequest");
    }
  }, 1000);
}

// On page load, check if cooldown exists in localStorage
let lastRequest = localStorage.getItem("lastResetRequest");
if (lastRequest) {
  const remaining = Math.floor((lastRequest - Date.now()) / 1000);
  if (remaining > 0) {
    disableButton(remaining);
  } else {
    localStorage.removeItem("lastResetRequest");
  }
}

// Check flashed messages and start cooldown if reset link sent
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
  {% for category, message in messages %}
    {% if category == "success" or category == "info" %}
      const expireTime = Date.now() + 60000;
      localStorage.setItem("lastResetRequest", expireTime);
      disableButton(60);
    {% endif %}
  {% endfor %}
{% endif %}
{% endwith %}
</script>
</body>
</html>
