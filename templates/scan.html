{% extends "base_owner.html" %}

{% block title %}Scan{% endblock %}

{% block styles %}
<style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
        }

        h1 {
            color: #0d6efd;
            font-weight: 600;
            margin-bottom: 30px;
        }
        #reader {
            margin: 0 auto 20px;
            width: 300px;
            border-radius: 1rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 10px;
            background-color: #fff;
        }
        .btn-qr {
            padding: 10px 25px;
            font-size: 16px;
            margin: 5px;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-qr:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
    </style>
{% endblock %}

{% block content %}
<div class="container text-center mt-4">
    <h1>Scan Dog QR Code</h1>

    <div id="reader"></div>

    <div>
        <button class="btn btn-success btn-qr" onclick="startScanner()">Start Camera</button>
        <button class="btn btn-danger btn-qr" onclick="stopScanner()">Stop Camera</button>
    </div>
</div>

   <script>
    let html5QrCode;
    let scanned = false;

    function startScanner() {
        scanned = false;
        html5QrCode = new Html5Qrcode("reader");

        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            qrCodeMessage => {

                if (scanned) return; // prevent multiple scans
                scanned = true;

                console.log("QR detected:", qrCodeMessage);

                html5QrCode.stop();

                // If QR is a full URL, go directly
                if (qrCodeMessage.startsWith("http")) {
                    window.location.href = qrCodeMessage;
                } 
                // If QR is only UUID
                else {
                    window.location.href = `/dog/${qrCodeMessage}`;
                }
            },
            errorMessage => {}
        ).catch(err => {
            alert("Camera access denied or unavailable.");
            console.error(err);
        });
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop();
        }
    }
</script>
{% endblock %}
