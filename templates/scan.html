<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scan QR Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            text-align: center;
            padding-top: 50px;
        }
        h1 {
            color: #0d6efd;
            font-weight: 600;
            margin-bottom: 30px;
        }
        #reader {
            margin: 0 auto 20px;
            width: 300px;
            border-radius: 1rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 10px;
            background-color: #fff;
        }
        .btn-qr {
            padding: 10px 25px;
            font-size: 16px;
            margin: 5px;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-qr:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <h1>Scan Dog QR Code</h1>

    <div id="reader"></div>

    <div>
        <button class="btn btn-success btn-qr" onclick="startScanner()">Start Camera</button>
        <button class="btn btn-danger btn-qr" onclick="stopScanner()">Stop Camera</button>
    </div>

    <script>
        let html5QrCode;

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");

            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                qrCodeMessage => {
                    console.log(`QR Code detected: ${qrCodeMessage}`);
                    window.location.href = qrCodeMessage; // Redirect to the link encoded in QR
                },
                errorMessage => {
                    // Ignore scan errors for now
                }
            ).catch(err => {
                alert("Camera access denied or not available.");
                console.error(err);
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    console.log("Camera stopped.");
                }).catch(err => console.error(err));
            }
        }
    </script>
</body>
</html>
