{% extends "base_owner.html" %}

{% block title %}Scan{% endblock %}

{% block styles %}
<style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
        }

        h1 {
            color: #0d6efd;
            font-weight: 600;
            margin-bottom: 30px;
        }
        #reader {
            margin: 0 auto 20px;
            width: 70%;
            border-radius: 1rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 10px;
            background-color: #fff;
        }
        .btn-qr {
            padding: 10px 25px;
            font-size: 16px;
            margin: 5px;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-qr:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
    </style>
{% endblock %}

{% block content %}
<div class="container text-center mt-4">
    <h1>Scan Dog QR Code</h1>

    <div id="reader"></div>

    <div>
        <button class="btn btn-success btn-qr" onclick="startScanner()">Start Camera</button>
        <button class="btn btn-danger btn-qr" onclick="stopScanner()">Stop Camera</button>
    </div>
</div>

<script>
let html5QrCode;
let scanned = false;

function startScanner() {
    if (!Html5Qrcode) {
        alert("QR library not loaded");
        return;
    }

    scanned = false;
    html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras().then(cameras => {
        if (cameras.length === 0) {
            alert("No camera found");
            return;
        }

        html5QrCode.start(
            cameras[0].id,
            { fps: 10, qrbox: 250 },
            (qrCodeMessage) => {
                if (scanned) return;
                scanned = true;

                html5QrCode.stop();

                if (qrCodeMessage.startsWith("http")) {
                    window.location.href = qrCodeMessage;
                } else {
                    window.location.href = `/dog/${qrCodeMessage}`;
                }
            }
        );
    }).catch(err => {
        console.error(err);
        alert("Camera permission denied");
    });
}

function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop();
    }
}
</script>
{% endblock %}
