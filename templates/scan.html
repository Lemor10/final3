{% extends "base_owner.html" %}

{% block title %}Scan{% endblock %}

{% block styles %}
<style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
        }

        h1 {
            color: #0d6efd;
            font-weight: 600;
            margin-bottom: 30px;
        }

        #reader {
            width: 100%;
            max-width: 320px;
            margin: 0 auto 15px;
            border-radius: 1rem;
            overflow: hidden;
        }

        .btn-qr {
            padding: 8px 14px;
            font-size: 14px;
            margin: 5px;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-qr:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
    </style>
{% endblock %}

{% block content %}
<div class="container text-center mt-4">
    <h1>Scan Dog QR Code</h1>

    <div id="reader"></div>

    <div>
        <button class="btn btn-success btn-qr" onclick="startScanner()">Start Camera</button>
        <button class="btn btn-danger btn-qr" onclick="stopScanner()">Stop Camera</button>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.10/html5-qrcode.min.js"></script>
<script>
let html5QrCode;
let isScanning = false;

function startScanner() {
    if (isScanning) return;

    html5QrCode = new Html5Qrcode("reader");
    isScanning = true;

    Html5Qrcode.getCameras().then(cameras => {
        if (!cameras || cameras.length === 0) {
            alert("No camera found on this device.");
            return;
        }

        const cameraId = cameras[0].id;

        html5QrCode.start(
            cameraId,
            {
                fps: 10,
                qrbox: { width: 220, height: 220 }
            },
            qrText => {
                isScanning = false;
                html5QrCode.stop().then(() => {
                    window.location.href = qrText;
                });
            },
            errorMessage => {
                // optional: console.log(errorMessage);
            }
        );

    }).catch(err => {
        alert("Camera permission denied or not supported.");
        console.error(err);
    });
}

function stopScanner() {
    if (html5QrCode && isScanning) {
        html5QrCode.stop().then(() => {
            isScanning = false;
        });
    }
}
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    if (window.innerWidth <= 768) {
        startScanner();
    }
});
</script>
{% endblock %}
