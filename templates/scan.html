<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scan QR Code</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f9f9f9; }
        #reader { width: 300px; margin: 30px auto; }
        h1 { color: #333; }
        button { padding: 10px 20px; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Scan Dog QR Code</h1>
    <div id="reader"></div>
    <button onclick="startScanner()">Start Camera</button>
    <button onclick="stopScanner()">Stop Camera</button>

    <script>
        let html5QrCode;

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");

            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                qrCodeMessage => {
                    console.log(`QR Code detected: ${qrCodeMessage}`);
                    window.location.href = qrCodeMessage; // Redirect to the link encoded in QR
                },
                errorMessage => {
                    // Ignore errors for now
                }
            ).catch(err => {
                alert("Camera access denied or not available.");
                console.error(err);
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    console.log("Camera stopped.");
                }).catch(err => console.error(err));
            }
        }
    </script>
</body>
</html>
