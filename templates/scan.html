<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scan QR Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
        }
.navbar-brand { font-weight: 600; letter-spacing: 0.5px; }
.navbar-nav .nav-link {
  transition: all 0.2s ease;
  margin: 0 5px;
  border-radius: 6px;
}
.navbar-nav .nav-link:hover {
  background-color: #0b5ed7;
  color: white !important;
  transform: translateY(-2px);
}

        h1 {
            color: #0d6efd;
            font-weight: 600;
            margin-bottom: 30px;
        }
        #reader {
            margin: 0 auto 20px;
            width: 300px;
            border-radius: 1rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 10px;
            background-color: #fff;
        }
        .btn-qr {
            padding: 10px 25px;
            font-size: 16px;
            margin: 5px;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-qr:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

{% include 'navbar_owner.html' %}

<div class="container text-center mt-4">
    <h1>Scan Dog QR Code</h1>

    <div id="reader"></div>

    <div>
        <button class="btn btn-success btn-qr" onclick="startScanner()">Start Camera</button>
        <button class="btn btn-danger btn-qr" onclick="stopScanner()">Stop Camera</button>
    </div>
</div>

   <script>
    let html5QrCode;
    let scanned = false;

    function startScanner() {
        scanned = false;
        html5QrCode = new Html5Qrcode("reader");

        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            qrCodeMessage => {

                if (scanned) return; // prevent multiple scans
                scanned = true;

                console.log("QR detected:", qrCodeMessage);

                html5QrCode.stop();

                // If QR is a full URL, go directly
                if (qrCodeMessage.startsWith("http")) {
                    window.location.href = qrCodeMessage;
                } 
                // If QR is only UUID
                else {
                    window.location.href = `/dog/${qrCodeMessage}`;
                }
            },
            errorMessage => {}
        ).catch(err => {
            alert("Camera access denied or unavailable.");
            console.error(err);
        });
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop();
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
