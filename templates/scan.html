{% extends "base_owner.html" %}

{% block title %}Scan{% endblock %}

{% block styles %}
<style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
        }

        h1 {
            color: #0d6efd;
            font-weight: 600;
            margin-bottom: 30px;
        }

        #reader {
            width: 100%;
            max-width: 320px;
            margin: 0 auto 15px;
            border-radius: 1rem;
            overflow: hidden;
        }

        .btn-qr {
            padding: 8px 14px;
            font-size: 14px;
            margin: 5px;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-qr:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
    </style>
{% endblock %}

{% block content %}
<div class="container text-center mt-4">
    <h1>Scan Dog QR Code</h1>

    <div id="reader"></div>

    <div>
        <button class="btn btn-success btn-qr" onclick="startScanner()">Start Camera</button>
        <button class="btn btn-danger btn-qr" onclick="stopScanner()">Stop Camera</button>
    </div>
</div>
<div id="qr-reader" style="width: 100%; max-width: 350px; margin: auto;"></div>
<div class="d-flex justify-content-center mt-2">
    <button id="switchCamera" class="btn btn-outline-secondary btn-qr w-30">
        Switch Camera
    </button>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.10/html5-qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script>
let html5QrCode;
let cameras = [];
let currentCameraIndex = 0;
let started = false;

async function initAndStart() {
  if (started) return;

  cameras = await Html5Qrcode.getCameras();
  if (!cameras.length) {
    alert("No camera found");
    return;
  }

  html5QrCode = new Html5Qrcode("qr-reader");

  await html5QrCode.start(
    cameras[currentCameraIndex].id,
    { fps: 10, qrbox: 250 },
    decodedText => {
      console.log("QR:", decodedText);
      html5QrCode.stop();
    }
  );

  started = true;
}

/* FIRST USER INTERACTION */
document.addEventListener("click", initAndStart, { once: true });
document.addEventListener("touchstart", initAndStart, { once: true });

async function switchCamera() {
  if (!html5QrCode || cameras.length < 2) return;

  await html5QrCode.stop();
  currentCameraIndex = (currentCameraIndex + 1) % cameras.length;
  initAndStart();
}

document.getElementById("switchCamera").addEventListener("click", switchCamera);
</script>
{% endblock %}
